<h2>架构图类型示例</h2>
<p class="subtitle">三种主要架构图的视觉风格对比</p>

<div class="cards">
  <div class="card" data-choice="deployment" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">部署架构图</div>
        <div class="mockup-body" style="padding: 16px;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="mock-box" style="padding: 8px; background: #e3f2fd; border-radius: 4px;">用户</div>
            <div style="font-size: 12px;">→</div>
            <div class="mock-box" style="padding: 8px; background: #fff3e0; border-radius: 4px;">负载均衡</div>
          </div>
          <div style="margin-top: 12px; display: flex; gap: 8px;">
            <div class="mock-box" style="padding: 8px; background: #fce4ec; border-radius: 4px; width: 45%;">Server A</div>
            <div class="mock-box" style="padding: 8px; background: #fce4ec; border-radius: 4px; width: 45%;">Server B</div>
          </div>
          <div style="margin-top: 12px; text-align: center;">
            <div class="mock-box" style="padding: 8px; background: #e8f5e9; border-radius: 4px;">数据库集群</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>部署架构图</h3>
      <p>展示服务器、网络、云资源等物理部署拓扑</p>
    </div>
  </div>

  <div class="card" data-choice="business" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">业务架构图</div>
        <div class="mockup-body" style="padding: 16px;">
          <div style="text-align: center; margin-bottom: 12px;">
            <div class="mock-box" style="padding: 8px; background: #7e57c2; color: white; border-radius: 4px;">电商平台</div>
          </div>
          <div style="display: flex; gap: 8px; justify-content: center;">
            <div class="mock-box" style="padding: 6px; background: #ff7043; color: white; border-radius: 4px;">用户中心</div>
            <div class="mock-box" style="padding: 6px; background: #26a69a; color: white; border-radius: 4px;">商品中心</div>
            <div class="mock-box" style="padding: 6px; background: #42a5f5; color: white; border-radius: 4px;">订单中心</div>
          </div>
          <div style="margin-top: 8px; display: flex; gap: 8px; justify-content: center;">
            <div class="mock-box" style="padding: 6px; background: #ffa726; color: white; border-radius: 4px;">支付</div>
            <div class="mock-box" style="padding: 6px; background: #78909c; color: white; border-radius: 4px;">物流</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>业务架构图</h3>
      <p>展示业务模块、组织结构、业务流程关系</p>
    </div>
  </div>

  <div class="card" data-choice="function" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">功能架构图</div>
        <div class="mockup-body" style="padding: 16px;">
          <div style="border-bottom: 1px dashed #ccc; padding-bottom: 8px; margin-bottom: 8px;">
            <div class="mock-box" style="padding: 6px; background: #5c6bc0; color: white; border-radius: 4px; text-align: center;">API Gateway</div>
          </div>
          <div style="display: flex; gap: 8px; margin-bottom: 8px;">
            <div class="mock-box" style="padding: 6px; background: #4caf50; color: white; border-radius: 4px; width: 30%;">认证模块</div>
            <div class="mock-box" style="padding: 6px; background: #2196f3; color: white; border-radius: 4px; width: 30%;">业务处理</div>
            <div class="mock-box" style="padding: 6px; background: #ff9800; color: white; border-radius: 4px; width: 30%;">数据访问</div>
          </div>
          <div style="text-align: center;">
            <div class="mock-box" style="padding: 6px; background: #9e9e9e; color: white; border-radius: 4px;">数据库</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>功能架构图</h3>
      <p>展示系统分层、功能模块、模块依赖关系</p>
    </div>
  </div>
</div>

<p style="margin-top: 16px; text-align: center; color: #666;">这是三种架构图的大致风格，你有什么想法吗？</p>
